
<style>
h2.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important;display:block!important}
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink2:#3a3a4a;--ink3:#8a8a9a;
  --paper:#f6f6f4;--surface:#fff;--surface2:#f0f0ee;
  --accent:#1a4fd6;--accent2:#2563eb;--accent-soft:#e8eefb;
  --ok:#0a6e4a;--ok-soft:#e0f5ed;--ok2:#065f46;--ok2-soft:#d1fae5;
  --warn:#b45309;--warn-soft:#fef3c7;
  --err:#b91c1c;--err-soft:#fee2e2;
  --info:#1e40af;--info-soft:#dbeafe;
  --border:#deded9;--r:8px;--r2:12px;
  --sh:0 1px 4px rgba(0,0,0,.06);--sh2:0 8px 40px rgba(0,0,0,.18);
}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
button{cursor:pointer}.hidden{display:none!important}
.boot{min-height:100vh;display:flex;align-items:center;justify-content:center}
.loader{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:40px 36px;width:410px;max-width:95vw;box-shadow:var(--sh)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.auth-logo-mark{width:36px;height:36px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:9px;font-weight:800;color:#fff;text-align:center;line-height:1.3}
.auth-logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.auth-logo-sub{font-size:11px;color:var(--ink3);display:block;margin-top:1px}
.adivider{border:none;border-top:1px solid var(--border);margin:0 0 20px}
.ptabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.ptab{flex:1;padding:8px;border:none;background:var(--surface2);color:var(--ink3);font-size:13px;font-weight:500;transition:all .15s;border-right:1px solid var(--border)}
.ptab:last-child{border-right:none}
.ptab.active{background:var(--ink);color:#fff}
.fg{margin-bottom:12px}
.fg-row{display:grid;gap:10px;margin-bottom:12px}
.fg-row.c2{grid-template-columns:1fr 1fr}
label.fl{display:block;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--ink);outline:none;transition:all .15s}
.fi:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fi:disabled{background:var(--surface2);color:var(--ink3);cursor:not-allowed}
.pw-wrap{position:relative}.pw-wrap .fi{padding-right:38px}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink3);font-size:14px;padding:2px}

/* TYPE SELECT */
.type-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-opt{border:1.5px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface)}
.type-opt:hover{border-color:var(--accent2);background:var(--accent-soft)}
.type-opt.active{border-color:var(--accent);background:var(--accent-soft)}
.type-opt-icon{font-size:24px;margin-bottom:6px}
.type-opt-label{font-size:13px;font-weight:600;color:var(--ink)}
.type-opt-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.type-badge.fornecedor{background:#e0f5ed;color:#0a6e4a}
.type-badge.transportadora{background:#e0f2fe;color:#0369a1}

/* BUTTONS */
.btn{width:100%;padding:11px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:#1e2030}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--err);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.btn-ok2{background:var(--ok2);color:#fff}
.btn-purple{background:#7e22ce;color:#fff}
.btn-excel{background:#1d6f42;color:#fff}
.btn-print{background:#374151;color:#fff}
.btn-sm{width:auto;padding:7px 14px;font-size:12px}
.btn-xs{width:auto;padding:5px 10px;font-size:11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer}
.btn-xs:hover{background:var(--surface2)}
.btn-add{width:auto;padding:6px 12px;font-size:12px;border:1px dashed var(--accent2);background:var(--accent-soft);color:var(--accent);border-radius:var(--r);transition:all .15s}
.btn-add:hover{background:var(--accent);color:#fff;border-style:solid}

/* FAQ */
.faq-btn{position:fixed;bottom:24px;right:24px;z-index:150;background:var(--accent);color:#fff;border:none;border-radius:100px;padding:10px 18px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(26,79,214,.35);display:flex;align-items:center;gap:8px;transition:all .2s;font-family:'Syne',sans-serif}
.faq-btn:hover{background:var(--accent2);transform:translateY(-2px)}
.faq-item{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.faq-q{width:100%;text-align:left;padding:12px 16px;background:var(--surface);border:none;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .15s}
.faq-q:hover{background:var(--accent-soft);color:var(--accent)}
.faq-q.open{background:var(--accent);color:#fff}
.faq-a{display:none;padding:12px 16px;font-size:13px;color:var(--ink2);background:var(--surface2);line-height:1.65;border-top:1px solid var(--border)}
.faq-a.open{display:block}

/* NAV */
.topnav{background:var(--ink);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.tnav-left{display:flex;align-items:center;gap:18px}
.tnav-logo{display:flex;align-items:center;gap:8px}
.tnav-logo-mark{width:28px;height:28px;background:rgba(255,255,255,.12);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:8px;font-weight:800;color:#fff;text-align:center;line-height:1.2}
.tnav-logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff}
.tnav-sep{width:1px;height:18px;background:rgba(255,255,255,.1)}
.tnav-tabs{display:flex;gap:2px}
.tnav-tab{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;transition:all .15s}
.tnav-tab:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.tnav-tab.active{background:rgba(255,255,255,.12);color:#fff}
.tnav-right{display:flex;align-items:center;gap:8px}
.user-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);transition:all .15s;cursor:pointer}
.user-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.logout-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);transition:all .15s}
.logout-btn:hover{color:#fff}

/* PAGE */
.page{padding:24px;max-width:1200px;margin:0 auto}
.ptitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.3px}
.psub{font-size:12px;color:var(--ink3);margin-top:2px}
.split{display:grid;grid-template-columns:355px 1fr;gap:18px;align-items:start}
.lcol{display:flex;flex-direction:column;gap:12px}
.rcol{display:flex;flex-direction:column;gap:12px}

/* CAL */
.cal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.cal-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cal-month{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.cal-navs{display:flex;gap:4px}
.carrow{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink2);transition:all .15s;cursor:pointer}
.carrow:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--border);gap:1px}
.cal-dow{background:var(--surface2);color:var(--ink3);text-align:center;padding:7px 2px;font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.cal-cell{background:var(--surface);padding:6px;min-height:52px;cursor:pointer;transition:background .12s}
.cal-cell:hover:not(.dis):not(.empty):not(.full){background:var(--accent-soft)}
.cal-cell.empty{background:var(--surface2);cursor:default}
.cal-cell.dis{background:var(--surface2);cursor:not-allowed;opacity:.4}
.cal-cell.full{background:#fef2f2;cursor:not-allowed}
.cal-cell.sel{background:var(--accent-soft);outline:2px solid var(--accent);outline-offset:-2px}
.cal-cell.today .cn{background:var(--ink);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cn{font-size:11px;font-weight:600;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cc{font-size:8px;font-weight:600;padding:1px 4px;border-radius:4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc.pendente{background:var(--warn-soft);color:var(--warn)}.cc.confirmado{background:var(--ok-soft);color:var(--ok)}
.cc.recebido{background:var(--ok2-soft);color:var(--ok2)}.cc.full-tag{background:var(--err-soft);color:var(--err)}
.cc.more{background:var(--accent-soft);color:var(--accent)}
.cbar{height:2px;border-radius:2px;margin-top:3px;background:var(--border)}
.cbar-fill{height:100%;border-radius:2px}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;padding:9px 14px;border-top:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* AVISOS */
.avisos-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.av-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.6px;text-transform:uppercase}
.av-item{display:flex;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.5;align-items:flex-start}
.av-item:last-child{border-bottom:none}
.av-item.warn{background:#fffdf5}.av-item.err{background:#fffafa}.av-item.info{background:#f8faff}.av-item.neutral{background:var(--surface2)}
.av-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.av-text strong{display:block;font-weight:600;font-size:11px;margin-bottom:1px}
.av-text span{color:var(--ink2)}

/* ATENÇÃO */
.atencao{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.atencao-text{font-size:12px;color:#7f1d1d;line-height:1.6}
.atencao-text strong{display:block;font-weight:700;color:#991b1b;margin-bottom:3px}

/* KIT */
.kit-box{background:var(--ink);border-radius:var(--r);padding:16px 20px;margin:12px 0;text-align:center}
.kit-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.kit-code{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#60a5fa;letter-spacing:4px}
.kit-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.kit-pending{display:inline-flex;align-items:center;gap:6px;background:var(--warn-soft);color:var(--warn);border:1px solid #fde68a;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600}

/* FORM CARD */
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.fcard-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.fcard-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.fcard-body{padding:16px 18px}
.hbox{display:flex;align-items:center;gap:14px;background:var(--ink);border-radius:var(--r);padding:12px 16px;margin-bottom:14px}
.htime{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px}
.hlabel{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);display:block;margin-bottom:2px}
.hsub{font-size:10px;color:rgba(255,255,255,.4)}
.hbadge{margin-left:auto;background:rgba(255,255,255,.08);border-radius:6px;padding:5px 10px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
.limwrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:14px}
.limrow{display:flex;align-items:center;gap:10px;margin-bottom:6px}.limrow:last-child{margin-bottom:0}
.limlabel{font-size:11px;font-weight:600;color:var(--ink2);min-width:56px}
.limtrack{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.limfill{height:100%;border-radius:4px;transition:width .25s,background .25s}
.limtxt{font-size:11px;font-weight:600;min-width:90px;text-align:right;color:var(--ink2)}

/* NF TABLE */
.nft-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.nft-head{display:grid;grid-template-columns:1fr 1fr 80px 70px 86px 86px 26px;gap:6px;background:var(--surface2);padding:7px 10px;font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase}
.nft-row{display:grid;grid-template-columns:1fr 1fr 80px 70px 86px 86px 26px;gap:6px;padding:8px 10px;border-top:1px solid var(--border);align-items:center;background:var(--surface)}
.nft-row:hover{background:var(--paper)}
.nfi{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink);outline:none;font-size:12px}
.nfi:focus{border-color:var(--accent2)}
.upmini{border:1px dashed var(--border);border-radius:6px;padding:5px 4px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2);font-size:9px;color:var(--ink3);font-weight:600;line-height:1.4}
.upmini:hover{border-color:var(--accent2);background:var(--accent-soft);color:var(--accent)}
.upmini.done{border-color:var(--ok);background:var(--ok-soft);color:var(--ok);border-style:solid}
.upmini.err-file{border-color:var(--err);background:var(--err-soft);color:var(--err)}
.rmbtn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--ink3);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.rmbtn:hover{background:var(--err-soft);color:var(--err);border-color:var(--err)}

/* IMPORT LOTE */
.import-lote-box{border:2px dashed var(--accent2);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--accent-soft);margin-bottom:10px}
.import-lote-box:hover{background:var(--accent);border-color:var(--accent)}
.import-lote-box:hover .import-lote-text{color:#fff}
.import-lote-icon{font-size:24px;margin-bottom:6px}
.import-lote-text{font-size:12px;color:var(--accent);font-weight:600}
.import-lote-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* EMPTY */
.empty-state{text-align:center;padding:36px 20px}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.35}
.empty-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:5px;color:var(--ink2)}
.empty-sub{font-size:12px;color:var(--ink3);line-height:1.6}

/* STATS */
.stats6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.blue::after{background:var(--accent)}.sc.green::after{background:var(--ok)}.sc.warn::after{background:var(--warn)}
.sc.neutral::after{background:var(--ink3)}.sc.purple::after{background:#7e22ce}.sc.red::after{background:var(--err)}.sc.teal::after{background:var(--ok2)}
.sc-label{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.sc-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.sc-val.blue{color:var(--accent)}.sc-val.green{color:var(--ok)}.sc-val.warn{color:var(--warn)}.sc-val.purple{color:#7e22ce}.sc-val.red{color:var(--err)}.sc-val.teal{color:var(--ok2)}
.sc-hint{font-size:10px;color:var(--ink3);margin-top:4px}

/* TABLE */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.card-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--paper)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px;text-transform:uppercase}
.badge.pendente{background:var(--warn-soft);color:var(--warn)}.badge.confirmado{background:var(--ok-soft);color:var(--ok)}
.badge.cancelado{background:var(--err-soft);color:var(--err)}.badge.reagendado{background:var(--info-soft);color:var(--info)}
.badge.inconsistencia{background:#fdf4ff;color:#7e22ce}.badge.ativo{background:var(--ok-soft);color:var(--ok)}
.badge.recebido{background:var(--ok2-soft);color:var(--ok2)}
.act-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink2);font-weight:500;transition:all .15s}
.act-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

/* WEEKLY */
.wk-cols{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.wcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.wcol-head{background:var(--ink);padding:10px 12px}
.wcol-head.today{background:var(--accent)}.wcol-head.full-day{background:var(--err)}
.wcol-date{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff}
.wcol-dow{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.wcol-cap{margin-top:6px}
.wcol-cap-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.wcol-cap-label{font-size:9px;color:rgba(255,255,255,.5);min-width:38px;font-weight:600}
.wcol-cap-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.wcol-cap-fill{height:100%;border-radius:4px}

async function loadDB(){
  try{
    const fornSnap=await _db.collection('fornecedores').get();
    DB.fornecedores=fornSnap.docs
      .filter(d=>!d.data().init && d.data().cnpj)  // só documentos válidos com CNPJ
      .map(d=>({...d.data(),_docId:d.id,id:d.data().id||d.id}));
    const agSnap=await _db.collection('agendamentos').get();
    DB.agendamentos=agSnap.docs
      .filter(d=>!d.data().init && d.data().data && d.data().fornNome)  // só agendamentos com data e fornecedor
      .map(d=>({...d.data(),_docId:d.id,id:d.data().id||d.id}));
    const cfgSnap=await _db.collection('Config').doc('kitSeq').get();
    DB.kitSeq=cfgSnap.exists?(cfgSnap.data().Valor||cfgSnap.data().valor||1):1;
    if(typeof DB.kitSeq==='string')DB.kitSeq=parseInt(DB.kitSeq)||1;
    await loadCapDias();
  }catch(e){console.error('Firebase loadDB error:',e)}
}

async function save(target='all',obj=null){
  showSyncBar();
  try{
    if(target==='fornecedor'&&obj){
      const data=_clean(obj);
      if(obj._docId){
        await _db.collection('fornecedores').doc(obj._docId).set(data,{merge:true});
      } else {
        const ref=await _db.collection('fornecedores').add(data);
        obj._docId=ref.id;
        obj.id=ref.id;
        await _db.collection('fornecedores').doc(ref.id).set({id:ref.id},{merge:true});
      }
    }
    else if(target==='agendamento'&&obj){
      const data=_clean(obj);
      if(obj._docId){
        await _db.collection('agendamentos').doc(obj._docId).set(data,{merge:true});
      } else {
        const ref=await _db.collection('agendamentos').add(data);
        obj._docId=ref.id;
        obj.id=ref.id;
        // Salvar o id dentro do documento para recuperar depois
        await _db.collection('agendamentos').doc(ref.id).set({id:ref.id},{merge:true});
      }
      await _db.collection('Config').doc('kitSeq').set({Valor:DB.kitSeq},{merge:true});
    }
    else{
      for(const f of DB.fornecedores){
        const data=_clean(f);
        if(f._docId)await _db.collection('fornecedores').doc(f._docId).set(data,{merge:true});
        else{const r=await _db.collection('fornecedores').add(data);f._docId=r.id}
      }
      for(const a of DB.agendamentos){
        const data=_clean(a);
        if(a._docId)await _db.collection('agendamentos').doc(a._docId).set(data,{merge:true});
        else{const r=await _db.collection('agendamentos').add(data);a._docId=r.id}
      }
      await _db.collection('Config').doc('kitSeq').set({Valor:DB.kitSeq},{merge:true});
    }
  }catch(e){console.error('Firebase save error:',e);toast('Erro ao salvar. Verifique a conexão.','e')}
  finally{hideSyncBar()}
}

function _clean(obj){const o={...obj};delete o._docId;return o}

function addWD(ds,n){const d=new Date(ds+'T12:00:00');let a=0;while(a<n){d.setDate(d.getDate()+1);const dw=d.getDay();if(dw!==0&&dw!==6)a++}return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function minD(){
  const now=new Date();
  const hr=now.getHours()+(now.getMinutes()/60);
  // Antes das 12:00 → D+1 (próximo dia útil); após 12:00 → D+2
  const dias=hr<12?1:2;
  return addWD(today(),dias);
}

function dayTotals(ds,exId=null){const ags=DB.agendamentos.filter(a=>a.data===ds&&a.status!=='cancelado'&&(exId===null||a.id!==exId));let v=0,s=0;ags.forEach(a=>{(a.nfs||[]).forEach(n=>{v+=parseInt(n.vol)||0;s+=parseInt(n.sku)||0})});return{vol:v,sku:s}}
function dayFull(ds,exId=null){const{vol,sku}=dayTotals(ds,exId);const{lv,ls}=getDayLim(ds);return vol>=lv||sku>=ls}
function dayDis(ds){if(ds<minD())return true;const dw=new Date(ds+'T12:00:00').getDay();return dw===0||dw===6}
function vEmail(v){return/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim())}
function vCNPJ(v){const c=v.replace(/\D/g,'');if(c.length!==14)return false;if(/^(\d)\1{13}$/.test(c))return false;let s=0,r;for(let i=0;i<12;i++)s+=parseInt(c[i])*(i<4?5-i:13-i);r=s%11<2?0:11-s%11;if(parseInt(c[12])!==r)return false;s=0;for(let i=0;i<13;i++)s+=parseInt(c[i])*(i<5?6-i:14-i);r=s%11<2?0:11-s%11;return parseInt(c[13])===r}
function vPhone(v){return v.replace(/\D/g,'').length>=10}
function maskCNPJ(el){let v=el.value.replace(/\D/g,'').slice(0,14);v=v.replace(/(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d)/,'$1-$2');el.value=v}
function maskPhone(el){let v=el.value.replace(/\D/g,'').slice(0,11);if(v.length>6)v=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;else if(v.length>2)v=`(${v.slice(0,2)}) ${v.slice(2)}`;el.value=v}

/* LOGIN FLEX — CNPJ, telefone ou email */
function findUserByLogin(login){
  const l=login.trim().toLowerCase();
  const digits=l.replace(/\D/g,'');
  return DB.fornecedores.find(f=>
    f.cnpj===login.trim()||
    (digits.length>=10&&f.tel&&f.tel.replace(/\D/g,'')===digits)||
    (f.email&&f.email.toLowerCase()===l)
  );
}
function detectLoginType(v){
  const digits=v.replace(/\D/g,'');
  if(digits.length>=14)return'cnpj';
  if(digits.length>=10&&v.replace(/[\d\s\(\)\-]/g,'').length===0)return'tel';
  if(v.includes('@'))return'email';
  return'cnpj';
}

function handleFile(rowId,tipo,inp){
  const f=inp.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const ok=tipo==='pdf'?ext==='pdf':ext==='xml';
  const box=$(`up-${tipo}-${rowId}`);
  if(!ok){if(box){box.classList.add('err-file');box.innerHTML='✕<br>Inválido'}toast(`Use apenas .${tipo.toUpperCase()}`,'e');inp.value='';const r=U.nfRows.find(x=>x.id===rowId);if(r)r[tipo]=null;return}
  const row=U.nfRows.find(x=>x.id===rowId);
  if(box){box.classList.remove('err-file');box.classList.add('done');box.innerHTML='✓<br>'+f.name.slice(0,7)+'…'}

  // Ler arquivo como base64 para download posterior sem corrupção
  const readerB64=new FileReader();
  readerB64.onload=function(ev){
    if(row){
      row[tipo]=f.name;
      row[tipo+'_data']=ev.target.result; // base64 completo: "data:application/pdf;base64,..."
    }
  };
  readerB64.readAsDataURL(f);

  // Se XML: também ler como texto para preencher campos automaticamente
  if(tipo==='xml'){
    const readerTxt=new FileReader();
    readerTxt.onload=function(e){
      try{
        const parser=new DOMParser();
        const xml=parser.parseFromString(e.target.result,'text/xml');
        const get=tag=>xml.getElementsByTagName(tag)[0]?.textContent||'';
        const nNF=get('nNF');
        const xPed=get('xPed')||get('nItemPed')||get('xPedido')||'';
        const itens=xml.getElementsByTagName('det');
        let totalVol=0,totalSku=itens.length;
        Array.from(itens).forEach(item=>{
          const qCom=parseFloat(item.getElementsByTagName('qCom')[0]?.textContent||'0');
          totalVol+=Math.round(qCom);
        });
        if(!totalVol&&itens.length){
          const qTrib=xml.getElementsByTagName('qTrib')[0]?.textContent;
          if(qTrib)totalVol=Math.round(parseFloat(qTrib));
        }
        if(row){
          if(nNF&&!row.nf){row.nf=nNF}
          if(xPed&&!row.oc){row.oc=xPed}
          if(totalVol>0&&!row.vol){row.vol=String(totalVol)}
          if(totalSku>0&&!row.sku){row.sku=String(totalSku)}
        }
        renderNFs();updateBars();
        if(nNF)toast(`NF ${nNF} lida do XML automaticamente.`);
      }catch(err){console.error('Erro ao ler XML:',err)}
    };
    readerTxt.readAsText(f);
  }
}

/* IMPORT LOTE */
function handleLoteImport(inp){
  const files=Array.from(inp.files);if(!files.length)return;
  const pdfs={},xmls={};
  files.forEach(f=>{
    const base=f.name.replace(/\.(pdf|xml)$/i,'').toLowerCase();
    const ext=f.name.split('.').pop().toLowerCase();
    if(ext==='pdf')pdfs[base]=f.name;
    else if(ext==='xml')xmls[base]=f.name;
  });
  const keys=new Set([...Object.keys(pdfs),...Object.keys(xmls)]);
  let added=0;
  keys.forEach(k=>{
    const id='nf'+nfC++;
    U.nfRows.push({id,nf:k.toUpperCase(),oc:'',vol:'',sku:'',pdf:pdfs[k]||null,xml:xmls[k]||null});
    added++;
  });
  renderNFs();updateBars();
  toast(`${added} NF(s) importada(s) em lote.`);
  inp.value='';
}

function mkFN(ds,fn,nf,ext){return`${ds2l(ds)}_${safe(fn)}_NF${nf}.${ext}`}
function dlFile(fname,b64data){
  if(b64data){
    // Arquivo real em base64
    const a=document.createElement('a');a.href=b64data;a.download=fname;a.click();
  } else {
    // Fallback: arquivo vazio com nome correto
    const blob=new Blob([`Arquivo: ${fname}`],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();URL.revokeObjectURL(a.href);
  }
}
function dlSel(agId){const boxes=document.querySelectorAll('.dl-check:checked');if(!boxes.length){toast('Selecione ao menos um arquivo.','e');return}boxes.forEach(cb=>dlFile(cb.dataset.fname,cb.dataset.b64||null));toast(`${boxes.length} arquivo(s) baixado(s).`)}
function selAllDL(c){document.querySelectorAll('.dl-check').forEach(x=>x.checked=c)}
function buildDL(a){
  let h='';(a.nfs||[]).forEach(n=>{
    ['pdf','xml'].forEach(ext=>{
      const fn=mkFN(a.data,a.fornNome,n.nf,ext);
      const b64=n[ext+'_data']||'';
      const b64attr=b64?`data-b64="${b64}"`:'';
      h+=`<div class="dl-item"><input type="checkbox" class="dl-check" data-fname="${fn}" ${b64attr} checked/><span class="dl-fname">${fn}</span><span class="dl-ext ${ext}">${ext.toUpperCase()}</span><button class="dl-btn" onclick="dlFile('${fn}',${b64?`this.closest('.dl-item').querySelector('.dl-check').dataset.b64`:'null'})">↓</button></div>`;
    });
  });
  return h||'<div style="font-size:12px;color:var(--ink3);padding:8px 0">Nenhum arquivo anexado.</div>';
}

function exportXLS(lista,label='agendamentos'){
  const rows=[['ID','Código KIT','Código interno','Tipo','Data','Dia da semana','Hora','Fornecedor','CNPJ','NFs','Volumes','SKUs','Status','Nova data','Motivo','Alterado por','Registrado em','Recebido em']];
  lista.forEach(a=>{
    const tv=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.vol)||0),0);
    const ts=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.sku)||0),0);
    const f=DB.fornecedores.find(x=>x.id===a.fornId)||{};
    const dt=a.data?new Date(a.data+'T12:00:00'):null;
    const dow=dt?DIAS[dt.getDay()]:'';
    const lastH=a.historico?a.historico[a.historico.length-1]:null;
    const novaData=lastH&&lastH.novaData?fmtD(lastH.novaData):'';
    const motivo=lastH&&lastH.motivo?lastH.motivo:'';
    const por=lastH&&lastH.por?lastH.por:'';
    rows.push([a.id,a.kit||'',a.codInterno||'',f.tipo||'Fornecedor',fmtD(a.data),dow,a.hora,a.fornNome,f.cnpj||'',(a.nfs||[]).map(n=>n.nf).join(', '),tv,ts,a.status,novaData,motivo,por,fmtD(a.criadoEm)||'',a.recebidoEm||'']);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${label}_${ds2l(today())}.csv`;a.click();URL.revokeObjectURL(a.href);
  toast('Exportação concluída.');
}

async function excluirAg(docId){

  const a=DB.agendamentos.find(x=>x._docId===docId||x.id===docId);

  try{
    await _db.collection('agendamentos').doc(docId).delete();
    if(a)DB.agendamentos=DB.agendamentos.filter(x=>x._docId!==docId&&x.id!==docId);
    hideSyncBar();closeP();toast('Agendamento excluído.');renderAgs();

/* Retorna o número sequencial de um agendamento baseado na ordem de criação (id numérico) */
function getSeqId(ag){
  const sorted=[...DB.agendamentos].sort((a,b)=>{
    const na=typeof a.id==='number'?a.id:parseInt(a.id)||0;
    const nb=typeof b.id==='number'?b.id:parseInt(b.id)||0;
    return na-nb;
  });
  const idx=sorted.findIndex(x=>x._docId===ag._docId||x.id===ag.id);
  return idx>=0?idx+1:0;
}

async function doLogin(){

  if(l===ADMIN.login&&p===ADMIN.senha){S.user={nome:'Administrador'};S.role='gerente';renderApp();return}
  const f=findUserByLogin(l);
  if(!f||f.senha!==p){showA('l-alert','Login ou senha inválidos.');return}

async function doRecuperar(){

  if(n.length<3){showA('c-alert','Razão social inválida.');return}
  if(!vCNPJ(c)){showA('c-alert','CNPJ inválido.');return}
  if(!vPhone(t)){showA('c-alert','Telefone inválido.');return}
  if(!vEmail(e)){showA('c-alert','E-mail inválido.');return}
  if(p.length<6){showA('c-alert','Senha mínimo 6 caracteres.');return}

async function salvarPerfil(){
  const nome=$('pf-nome').value.trim(),tel=$('pf-tel').value.trim(),email=$('pf-email').value.trim();
  const pa=$('pf-pa').value,pn=$('pf-pn').value,pn2=$('pf-pn2').value;

  if(pn||pa){
    if(pa!==S.user.senha){showA('pf-alert','Senha atual incorreta.');return}
    if(pn.length<6){showA('pf-alert','Nova senha mínimo 6 caracteres.');return}
    if(pn!==pn2){showA('pf-alert','Senhas não coincidem.');return}
    S.user.senha=pn;S.user.senhaTmp=null;
  }
  S.user.nome=nome;S.user.tel=tel;S.user.email=email;
  const idx=DB.fornecedores.findIndex(f=>f.id===S.user.id);
  if(idx>=0)DB.fornecedores[idx]={...DB.fornecedores[idx],...S.user};
  await save('fornecedor',DB.fornecedores[idx]||S.user);closeP();toast('Perfil atualizado!');
}

function rebuildCal(){
  const lbl=$('cal-lbl');if(lbl)lbl.textContent=MESES[U.cm]+' '+U.cy;
  const g=$('cgrid');if(!g)return;g.innerHTML='';
  DIAS.forEach(d=>{const e=document.createElement('div');e.className='cal-dow';e.textContent=d;g.appendChild(e)});
  const first=new Date(U.cy,U.cm,1).getDay(),days=new Date(U.cy,U.cm+1,0).getDate(),ts=today();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-cell empty';g.appendChild(e)}
  for(let d=1;d<=days;d++){
    const ds=U.cy+'-'+String(U.cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dw=new Date(ds+'T12:00:00').getDay();
    const isWE=dw===0||dw===6,dis=dayDis(ds),full=!dis&&dayFull(ds),sel=U.date===ds;
    const el=document.createElement('div');
    el.className='cal-cell'+(ds===ts?' today':'')+(dis||isWE?' dis':full?' full':sel?' sel':'');
    const cn=document.createElement('div');cn.className='cn';cn.textContent=d;el.appendChild(cn);
    if(!dis&&!isWE){
      const ags=DB.agendamentos.filter(a=>a.data===ds&&a.status!=='cancelado');
      if(full){const c=document.createElement('div');c.className='cc full-tag';c.textContent='Lotado';el.appendChild(c)}
      else{
        ags.slice(0,1).forEach(a=>{const c=document.createElement('div');c.className=`cc ${a.status}`;c.textContent=a.fornNome.split(' ')[0];el.appendChild(c)});
        if(ags.length>1){const c=document.createElement('div');c.className='cc more';c.textContent=`+${ags.length-1}`;el.appendChild(c)}
        const{vol,sku}=dayTotals(ds);const pct=Math.max(vol/LV,sku/LS);
        if(pct>0){const bar=document.createElement('div');bar.className='cbar';const fill=document.createElement('div');fill.className='cbar-fill';fill.style.width=Math.min(100,Math.round(pct*100))+'%';fill.style.background=pct>=0.9?'var(--err)':pct>=0.7?'var(--warn)':'var(--ok)';bar.appendChild(fill);el.appendChild(bar)}
      }
      if(!full&&!dis)el.onclick=()=>selDate(ds,d);
    }
    g.appendChild(el);
  }
}

function selDate(ds,d){
  U.date=ds;U.dateLabel=`${String(d).padStart(2,'0')}/${String(U.cm+1).padStart(2,'0')}/${U.cy}`;

}

async function confirmAg(){
  if(!U.nfRows.length){showA('ag-alert','Informe ao menos uma NF.');return}
  let ok=true,msg='',av=0,as=0;
  for(const r of U.nfRows){
    if(!r.nf.trim()){msg='Informe o número da NF.';ok=false;break}
    if(!r.oc.trim()){msg='Informe a ordem de compra.';ok=false;break}
    const v=parseInt(r.vol)||0,s=parseInt(r.sku)||0;
    if(v<=0){msg='Informe os volumes.';ok=false;break}
    if(s<=0){msg='Informe os SKUs.';ok=false;break}
    if(!r.pdf){msg='Anexe o PDF em todas as linhas.';ok=false;break}
    if(!r.xml){msg='Anexe o XML em todas as linhas.';ok=false;break}
    av+=v;as+=s;
  }
  if(!ok){showA('ag-alert',msg);return}
  const ex=dayTotals(U.date);
  if(ex.vol+av>LV){showA('ag-alert',`Capacidade excedida. Saldo: ${(LV-ex.vol).toLocaleString()} volumes.`);return}
  if(ex.sku+as>LS){showA('ag-alert',`Capacidade excedida. Saldo: ${LS-ex.sku} SKUs.`);return}
  const ag={fornId:S.user._docId||S.user.id,fornNome:S.user.nome,data:U.date,hora:'08:30',nfs:U.nfRows.map(r=>({nf:r.nf,oc:r.oc,vol:r.vol,sku:r.sku,pdf:r.pdf,pdf_data:r.pdf_data||null,xml:r.xml,xml_data:r.xml_data||null})),status:'pendente',kit:null,codInterno:null,criadoEm:today(),historico:[{tipo:'criado',titulo:'Agendamento registrado — aguardando análise',detalhe:`Data: ${fmtD(U.date)}`,dataHora:fmtDT()}]};
  DB.agendamentos.push(ag);
  await save('agendamento',ag);
  // Após save, _docId foi preenchido pelo Firebase — usa como id
  if(ag._docId)ag.id=ag._docId;
  U.date=null;U.dateLabel='';U.nfRows=[];
  openP(`<div class="popup-head"><div class="popup-title">Agendamento enviado!</div><button class="popup-close" onclick="closeP();renderCalF()">✕</button></div>
    <div class="popup-body">
      <div class="alert s">✓ Agendamento registrado com sucesso. Aguardando análise da equipe.</div>
      <div style="background:var(--warn-soft);border:1px solid #fde68a;border-radius:var(--r);padding:14px 16px;text-align:center;margin:12px 0">
        <div style="font-size:11px;color:var(--warn);font-weight:600;margin-bottom:4px">⏳ Código KIT</div>
        <div style="font-size:13px;color:var(--warn);font-weight:600">Disponível após confirmação pela equipe responsável.</div>
      </div>
      <div style="text-align:right;margin-top:16px"><button class="btn btn-accent btn-sm" onclick="closeP();renderForn('meus')">Ver meus agendamentos →</button></div>
    </div>`);
}

}

function openReagForn(id){
  const a=DB.agendamentos.find(x=>x.id==id||x._docId==id);if(!a)return;
  const tv=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.vol)||0),0);
  const ts=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.sku)||0),0);
  openP(`<div class="popup-head"><div class="popup-title">Reagendar — ${a.kit||'Agendamento'}</div><button class="popup-close" onclick="closeP()">✕</button></div>
    <div class="popup-body">
      <div class="alert i">ℹ Após reagendamento o status volta para <strong>Pendente</strong>, aguardando nova confirmação.</div>
      <div class="drow"><span class="dkey">Data atual</span><span class="dval"><strong>${fmtD(a.data)}</strong></span></div>
      <div class="drow"><span class="dkey">Volumes / SKUs</span><span class="dval">${tv.toLocaleString()} vol / ${ts} SKUs</span></div>
      <div class="fg" style="margin-top:14px"><label class="fl">Nova data</label><input type="date" id="reag-data" class="fi" min="${minD()}"/></div>
      <div id="reag-lim" style="font-size:11px;margin-bottom:6px"></div>
      <div id="reag-alert"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="closeP()">Cancelar</button>
        <button class="btn btn-info btn-sm" id="reag-btn" onclick="confReagForn('${id}')">Confirmar</button>
      </div>
    </div>`);
  $('reag-data').addEventListener('change',function(){
    const nd=this.value;if(!nd)return;
    const{vol,sku}=dayTotals(nd,id);
    const av=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.vol)||0),0);
    const as=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.sku)||0),0);
    const isFull=(vol+av>LV)||(sku+as>LS);
    const lim=$('reag-lim'),btn=$('reag-btn');
    if(isFull){
      const motivo=vol+av>LV?`O limite máximo de volumes do dia (${LV.toLocaleString()}) seria excedido. Saldo disponível: ${(LV-vol).toLocaleString()} volumes.`:`O limite máximo de SKUs do dia (${LS}) seria excedido. Saldo disponível: ${LS-sku} SKUs.`;
      if(lim)lim.innerHTML=`<div class="alert e">⚠ Não é possível agendar nesta data. ${motivo} Selecione outro dia com capacidade disponível.</div>`;
      if(btn){btn.disabled=true;btn.style.opacity='.4';btn.style.cursor='not-allowed'}
    } else {
      if(lim)lim.innerHTML=`<div class="alert s" style="margin-bottom:0">✓ Disponível: ${(LV-vol).toLocaleString()} volumes e ${LS-sku} SKUs neste dia.</div>`;
      if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer'}
    }
  });
}

async function confReagForn(id){
  const nd=$('reag-data').value;
  if(!nd){showA('reag-alert','Selecione uma nova data.');return}
  const dw=new Date(nd+'T12:00:00').getDay();if(dw===0||dw===6){showA('reag-alert','Selecione um dia útil.');return}
  const a=DB.agendamentos.find(x=>x.id==id||x._docId==id);if(!a)return;
  const{vol,sku}=dayTotals(nd,id);
  const av=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.vol)||0),0);
  const as=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.sku)||0),0);
  if(vol+av>LV||sku+as>LS){showA('reag-alert','Data não disponível. Verifique a capacidade do dia.');return}
  if(!a.historico)a.historico=[];
  a.historico.push({tipo:'reagendado',titulo:'Reagendado pelo fornecedor',detalhe:`De ${fmtD(a.data)} → Para ${fmtD(nd)}`,por:'Fornecedor',novaData:nd,dataHora:fmtDT()});
  a.data=nd;a.status='pendente';
  await save('agendamento',a);closeP();toast('Reagendamento realizado.');renderMeus();
}

async function cleanupInvalidDocs(){
  showSyncBar();
  let removed=0;
  try{
    const agSnap=await _db.collection('agendamentos').get();
    for(const d of agSnap.docs){
      const data=d.data();
      if(data.init||!data.data||!data.fornNome){
        await _db.collection('agendamentos').doc(d.id).delete();
        removed++;
      }
    }
    const fornSnap=await _db.collection('fornecedores').get();
    for(const d of fornSnap.docs){
      const data=d.data();
      if(data.init||!data.cnpj){
        await _db.collection('fornecedores').doc(d.id).delete();
        removed++;
      }
    }
    await loadDB();
    hideSyncBar();
    toast(`${removed} documento(s) inválido(s) removido(s).`);
    renderGer('dash');
  }catch(e){hideSyncBar();toast('Erro na limpeza.','e')}
}

function filterByStatus(status){
  const sel=$('f-st');if(!sel)return;
  sel.value=status==='hoje'?'':status;
  if(status==='hoje'){const de=$('f-de'),ate=$('f-ate');if(de)de.value=today();if(ate)ate.value=today()}
  applyF();
}

function getWeekDates(off){
  const t=new Date(today()+'T12:00:00');
  const dow=t.getDay();const diff=dow===0?-6:1-dow;
  const mon=new Date(t);mon.setDate(t.getDate()+diff+off*7);
  const dates=[];
  for(let i=0;i<5;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'))}
  return dates;
}

function renderWeek(){
  const dates=getWeekDates(U.wkOff);
  const ts=today();
  const s=new Date(dates[0]+'T12:00:00'),e=new Date(dates[4]+'T12:00:00');
  const lbl=`${s.getDate()} ${M3[s.getMonth()]} – ${e.getDate()} ${M3[e.getMonth()]} ${e.getFullYear()}`;
  $('gc').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div><div class="ptitle">Calendário de recebimentos</div><div class="psub">${lbl}</div></div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;min-width:170px;text-align:center">${lbl}</span>

        ${U.wkOff!==0?`<button style="padding:6px 14px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:500" onclick="U.wkOff=0;renderWeek()">Hoje</button>`:''}
      </div>
    </div>
    <div class="wk-cols" id="wcols"></div>`;
  const wc=$('wcols');
  dates.forEach(ds=>{
    const d=new Date(ds+'T12:00:00');const isT=ds===ts;
    const{vol,sku}=dayTotals(ds);
    const{lv,ls}=getDayLim(ds);
    const isCustom=!!capDias[ds];
    const pv=Math.min(100,Math.round(vol/lv*100)),ps=Math.min(100,Math.round(sku/ls*100));
    const isFull=vol>=lv||sku>=ls;
    const cv=pv>=90?'#ef4444':pv>=70?'#f59e0b':'#10b981';
    const cs=ps>=90?'#ef4444':ps>=70?'#f59e0b':'#10b981';
    const col=document.createElement('div');col.className='wcol';
    col.innerHTML=`<div class="wcol-head ${isT?'today':isFull?'full-day':''}" style="cursor:pointer" onclick="openCapDia('${ds}')" title="Clique para definir capacidade do dia">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="wcol-date">${d.getDate()} ${M3[d.getMonth()]}</div>
        ${isCustom?`<span style="font-size:9px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:3px;color:#fff">✎ custom</span>`:'<span style="font-size:9px;color:rgba(255,255,255,.3)">✎</span>'}
      </div>
      <div class="wcol-dow">${DIAS[d.getDay()]}${isT?' — Hoje':''}</div>
      <div class="wcol-cap">
        <div class="wcol-cap-row"><span class="wcol-cap-label">Vol.</span><div class="wcol-cap-track"><div class="wcol-cap-fill" style="width:${pv}%;background:${cv}"></div></div><span class="wcol-cap-txt">${vol.toLocaleString()}/${lv.toLocaleString()}</span></div>
        <div class="wcol-cap-row"><span class="wcol-cap-label">SKUs</span><div class="wcol-cap-track"><div class="wcol-cap-fill" style="width:${ps}%;background:${cs}"></div></div><span class="wcol-cap-txt">${sku}/${ls}</span></div>
      </div>
    </div>`;
    const body=document.createElement('div');body.className='wcol-body';
    const ags=DB.agendamentos.filter(a=>a.data===ds&&a.status!=='cancelado').sort((a,b)=>a.hora<b.hora?-1:1);
    if(!ags.length){body.innerHTML+='<div class="wempty">Sem agendamentos</div>'}
    else ags.forEach(a=>{
      const tv=(a.nfs||[]).reduce((s,n)=>s+(parseInt(n.vol)||0),0);
      const f=DB.fornecedores.find(x=>x.id===a.fornId)||{};
      const c=document.createElement('div');c.className=`wcard ${a.status}`;
      c.innerHTML=`<div class="wcard-top"><span class="wcard-name">${a.fornNome.split(' ')[0]}</span><span class="badge ${a.status}" style="font-size:9px;padding:2px 6px">${a.status}</span></div><div class="wcard-info" style="font-family:monospace;font-size:10px;color:var(--accent);font-weight:700">${a.kit||'Pendente KIT'}</div><div class="wcard-info"><span class="type-badge ${f.tipo||'fornecedor'}" style="font-size:8px;padding:1px 5px">${f.tipo||'Forn.'}</span> ${tv.toLocaleString()} vol</div>`;
      c.onclick=()=>openDet(a.id,true);body.appendChild(c);
    });
    col.appendChild(body);wc.appendChild(col);
  });

function getWeekAgs(){
  const dates=getWeekDates(U.wkOff);
  return DB.agendamentos.filter(a=>a.data>=dates[0]&&a.data<=dates[4]).sort((a,b)=>a.data<b.data?-1:1);
}

function confirmarExcluir(fornId){
  const f=DB.fornecedores.find(x=>x._docId===fornId||x.id===fornId||x.id==fornId);if(!f)return;
  const nAgs=DB.agendamentos.filter(a=>a.fornId===fornId).length;
  openP(`<div class="popup-head">
    <div class="popup-title">Excluir cadastro</div>
    <button class="popup-close" onclick="closeP()">✕</button>
  </div>
  <div class="popup-body">
    <div class="alert e">⚠ Tem certeza que deseja excluir o cadastro de <strong>${f.nome}</strong>?</div>
    ${nAgs>0?`<div class="alert i">ℹ Este usuário possui <strong>${nAgs} agendamento(s)</strong> vinculado(s). Os agendamentos não serão excluídos.</div>`:''}
    <div class="drow"><span class="dkey">Razão social</span><span class="dval">${f.nome}</span></div>
    <div class="drow"><span class="dkey">CNPJ</span><span class="dval" style="font-family:monospace">${f.cnpj}</span></div>
    <div class="drow"><span class="dkey">Tipo</span><span class="dval">${f.tipo||'fornecedor'}</span></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost btn-sm" onclick="closeP()">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="excluirUsuario('${fornId}')">Confirmar exclusão</button>
    </div>
  </div>`);
}

async function excluirUsuario(fornId){
  const f=DB.fornecedores.find(x=>x._docId===fornId||x.id===fornId||x.id==fornId);if(!f)return;
  showSyncBar();
  try{
    if(f._docId)await _db.collection('fornecedores').doc(f._docId).delete();
    DB.fornecedores=DB.fornecedores.filter(x=>x.id!==fornId);
    if(S.user&&S.user.id===fornId){S.user=null;S.role=null}
    hideSyncBar();closeP();toast('Cadastro excluído.');renderCads();
  }catch(e){hideSyncBar();toast('Erro ao excluir. Tente novamente.','e')}
}

function openRedefSenha(fornId){
  const f=DB.fornecedores.find(x=>x._docId===fornId||x.id===fornId||x.id==fornId);if(!f)return;
  openP(`<div class="popup-head"><div class="popup-title">Redefinir senha — ${f.nome}</div><button class="popup-close" onclick="closeP()">✕</button></div>
    <div class="popup-body">
      <div class="fg"><label class="fl">Nova senha</label><div class="pw-wrap"><input class="fi" id="rs-p" type="password" placeholder="Mínimo 6 caracteres" maxlength="40"/><button class="pw-toggle" type="button" onclick="togglePw('rs-p',this)">○</button></div></div>
      <div class="fg"><label class="fl">Confirmar</label><div class="pw-wrap"><input class="fi" id="rs-p2" type="password" maxlength="40"/><button class="pw-toggle" type="button" onclick="togglePw('rs-p2',this)">○</button></div></div>
      <div style="margin:10px 0;text-align:center;color:var(--ink3);font-size:12px">— ou —</div>
      <button class="btn btn-warn btn-sm" style="width:100%;margin-bottom:10px" onclick="gerarSenhaTmp('${fornId}')">Gerar senha temporária</button>
      <div id="rs-result"></div><div id="rs-alert"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost btn-sm" onclick="closeP()">Cancelar</button>
        <button class="btn btn-accent btn-sm" onclick="confRedefSenha('${fornId}')">Salvar</button>
      </div>
    </div>`);
}

async function confRedefSenha(fId){
  const p=$('rs-p').value,p2=$('rs-p2').value;
  if(p.length<6){showA('rs-alert','Senha mínimo 6 caracteres.');return}
  if(p!==p2){showA('rs-alert','Senhas não coincidem.');return}
  const f=DB.fornecedores.find(x=>x._docId===fId||x.id===fId||x.id==fId);if(!f)return;
  f.senha=p;f.senhaTmp=null;
  await save('fornecedor',f);closeP();toast('Senha redefinida.');
}

async function gerarSenhaTmp(fId){
  const f=DB.fornecedores.find(x=>x._docId===fId||x.id===fId||x.id==fId);if(!f)return;
  const tmp=genTmp();f.senha=tmp;f.senhaTmp=tmp;
  await save('fornecedor',f);
  const el=$('rs-result');
  if(el)el.innerHTML=`<div class="temp-pass-box"><div style="font-size:11px;color:var(--warn);margin-bottom:6px">Senha temporária gerada</div><div class="temp-pass">${tmp}</div><div style="font-size:11px;color:var(--warn);margin-top:6px">Informe ao usuário. Deve alterar após o primeiro acesso.</div></div>`;
}

function getFiltrados(){
  const sf=$('f-st')?.value||'';
  const df=$('f-de')?.value||'';
  const dt=$('f-ate')?.value||'';
  let l=DB.agendamentos;
  if(sf)l=l.filter(a=>a.status===sf);
  if(df)l=l.filter(a=>a.data>=df);
  if(dt)l=l.filter(a=>a.data<=dt);
  return l.sort((a,b)=>a.data<b.data?-1:1);
}

      else if(lastH&&lastH.tipo==='status_alterado')obs=`<span style="color:#6366f1;font-size:11px">⚙ Manual</span>`;
      const seqId='#'+String(getSeqId(a)).padStart(4,'0');
      return`<tr>
        <td><input type="checkbox" class="row-chk" data-id="${a.id}" style="accent-color:var(--accent)"/></td>
        <td style="font-family:monospace;font-size:11px;font-weight:700;color:var(--accent)">${seqId}</td>
        <td style="font-size:11px;color:var(--ink3)">${a.codInterno||'—'}</td>
        <td><span class="type-badge ${f.tipo||'fornecedor'}" style="font-size:9px">${f.tipo||'Forn.'}</span></td>
        <td><strong>${fmtD(a.data)}</strong> ${a.hora}</td>
        <td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.fornNome}</td>
        <td>${(a.nfs||[]).map(n=>n.nf).join(', ')}</td>
        <td>${tv.toLocaleString()}</td><td>${ts2}</td>
        <td><span class="badge ${a.status}">${a.status}</span></td>
        <td>${obs}</td>
        <td><button class="act-btn" onclick="openDet('${a._docId||a.id}',true)">Ver</button></td>
      </tr>`}).join(''):'<tr><td colspan="12" style="text-align:center;color:var(--ink3);padding:24px;font-size:12px">Nenhum registro.</td></tr>'}</tbody></table></div>`;
  if(sf){const el=$('f-st');if(el)el.value=sf}
  if(df){const el=$('f-de');if(el)el.value=df}
  if(dt){const el=$('f-ate');if(el)el.value=dt}
}

function applyF(){
  renderAgs($('f-st')?.value||'',$('f-de')?.value||'',$('f-ate')?.value||'');
}

function dlAllSel(){
  const sel=Array.from(document.querySelectorAll('.row-chk:checked')).map(c=>parseInt(c.dataset.id));
  if(!sel.length){toast('Selecione ao menos um agendamento.','e');return}
  let total=0;
  sel.forEach(id=>{const a=DB.agendamentos.find(x=>x.id==id||x._docId==id);if(!a)return;(a.nfs||[]).forEach(n=>{['pdf','xml'].forEach(ext=>{dlFile(mkFN(a.data,a.fornNome,n.nf,ext));total++})})});
  toast(`${total} arquivo(s) baixado(s).`);
}

(async()=>{await loadDB();renderApp()})();
</script>
